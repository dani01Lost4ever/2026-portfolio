services:

  pocketbase:
    image: dani01cs/portfolio-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PB_VERSION: "0.36.7"
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: dani01cs/portfolio-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Override with your production URL if deploying remotely:
        # VITE_PB_URL: https://api.yourdomain.com
        VITE_PB_URL: "http://localhost:8090"
    ports:
      - "809:80"
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pb_data:
